<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RootRy | Панель Администратора</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 640 512'%3E%3Cpath fill='%230099cc' d='M622.3 162.4l-296-120c-16.5-6.7-35.1-6.7-51.6 0l-296 120c-17.2 7-20.1 29.5-4.8 39.4l112 72.3c2.4 1.5 5.2 2.3 8 2.3H504c2.8 0 5.6-.8 8-2.3l112-72.3c15.2-10 12.3-32.4-4.8-39.4zM532.7 301.9l-20.7 13.4c-6 3.9-13 6-20.1 6H148.1c-7.1 0-14.1-2.1-20.1-6l-20.7-13.4c-4.4-2.9-10.3-1.6-13.2 2.9l-21.3 32.8c-4.6 7.1-1.6 16.5 6.2 19.8l197.4 82.5c24.6 10.3 52.6 10.3 77.2 0l197.4-82.5c7.8-3.3 10.8-12.7 6.2-19.8l-21.3-32.8c-2.9-4.5-8.8-5.8-13.2-2.9z'/%3E%3C/svg%3E">
    <link rel="stylesheet" href="home-style.css">
    <style>
        .admin-header-card {
            background: linear-gradient(135deg, #023e50, #0099cc);
            border-radius: 28px;
            padding: 32px 36px;
            max-width: 900px;
            margin-bottom: 24px;
            color: #fff;
            display: flex;
            align-items: center;
            gap: 20px;
        }
        .admin-header-card .admin-av {
            width: 72px; height: 72px; border-radius: 50%;
            border: 3px solid rgba(255,255,255,0.4);
            background: rgba(255,255,255,0.15);
            display: flex; align-items: center; justify-content: center;
            font-size: 32px;
        }
        .admin-header-card h2 { font-size: 22px; font-weight: 800; margin-bottom: 4px; }
        .admin-header-card p { font-size: 13px; opacity: 0.75; }
        .back-btn {
            margin-left: auto;
            background: rgba(255,255,255,0.15);
            color: #fff; border: 1.5px solid rgba(255,255,255,0.3);
            border-radius: 14px; padding: 10px 20px;
            font-size: 13px; font-weight: 700;
            cursor: pointer; font-family: 'Montserrat', sans-serif;
            transition: 0.2s; white-space: nowrap;
        }
        .back-btn:hover { background: rgba(255,255,255,0.28); }

        /* ===== STAT КАРТОЧКИ ===== */
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 16px;
            max-width: 900px;
            margin-bottom: 28px;
        }
        .stat-card {
            background: #fff;
            border-radius: 22px;
            padding: 24px 22px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #edf0f4;
            display: flex; flex-direction: column; gap: 6px;
            transition: 0.2s;
        }
        .stat-card:hover { transform: translateY(-3px); box-shadow: 0 10px 30px rgba(0,0,0,0.08); }
        .stat-card .sc-icon { font-size: 28px; }
        .stat-card .sc-val { font-size: 32px; font-weight: 900; color: #023e50; line-height: 1; }
        .stat-card .sc-label { font-size: 12px; font-weight: 700; color: #8e9fae; text-transform: uppercase; letter-spacing: 0.8px; }
        .stat-card .sc-sub { font-size: 11px; color: #94a3b8; margin-top: 2px; }

        /* Особые карточки */
        .stat-card.online-card { border-color: #6ee7b7; background: linear-gradient(135deg, #ecfdf5, #fff); }
        .stat-card.online-card .sc-val { color: #059669; }
        .stat-card.total-card { border-color: #bae6fd; background: linear-gradient(135deg, #f0f9ff, #fff); }
        .stat-card.total-card .sc-val { color: #0284c7; }

        /* ===== ПОЛЬЗОВАТЕЛИ ТАБЛИЦА ===== */
        .users-section-title {
            font-size: 16px; font-weight: 800; color: #023e50;
            margin-bottom: 16px; display: flex; align-items: center; gap: 10px;
        }
        .users-table-wrap {
            max-width: 900px;
            background: #fff; border-radius: 22px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.05);
            border: 1px solid #edf0f4;
            overflow: hidden;
        }
        .users-search {
            padding: 18px 24px; border-bottom: 1px solid #f0f4f8;
            display: flex; gap: 12px; align-items: center;
        }
        .users-search input {
            flex: 1; height: 40px; background: #f4f7f9;
            border: 2px solid transparent; border-radius: 12px;
            padding: 0 16px; font-size: 13px; font-weight: 600;
            font-family: 'Montserrat', sans-serif; outline: none; transition: 0.2s;
        }
        .users-search input:focus { border-color: #0099cc; background: #fff; }
        .users-search .total-badge {
            background: #e0f2fe; color: #0284c7; border-radius: 10px;
            padding: 6px 14px; font-size: 12px; font-weight: 800; white-space: nowrap;
        }
        table { width: 100%; border-collapse: collapse; }
        thead tr { background: #f8fafc; }
        th { padding: 12px 20px; text-align: left; font-size: 11px; font-weight: 800; color: #94a3b8; text-transform: uppercase; letter-spacing: 1px; }
        td { padding: 14px 20px; border-top: 1px solid #f0f4f8; font-size: 13px; font-weight: 600; color: #334155; vertical-align: middle; }
        tr:hover td { background: #fafbfc; }
        .user-av-cell { display: flex; align-items: center; gap: 10px; }
        .user-av-cell img { width: 34px; height: 34px; border-radius: 50%; border: 2px solid #e0f2fe; }
        .user-av-cell .uname-col { font-weight: 700; color: #023e50; font-size: 13px; }
        .user-av-cell .nick-col { font-size: 11px; color: #8e9fae; }
        .badge-admin { background: #fef3c7; color: #d97706; border-radius: 8px; padding: 3px 10px; font-size: 11px; font-weight: 800; }
        .badge-user  { background: #e0f2fe; color: #0284c7; border-radius: 8px; padding: 3px 10px; font-size: 11px; font-weight: 800; }
        .active-dot { display: inline-block; width: 8px; height: 8px; border-radius: 50%; background: #6b7280; margin-right: 5px; }
        .active-dot.today { background: #10b981; }
        .no-users { padding: 40px; text-align: center; color: #8e9fae; font-size: 14px; }

        /* ===== REFRESH BTN ===== */
        .refresh-btn {
            background: #f0f4f8; color: #023e50; border: none; border-radius: 12px;
            padding: 8px 18px; font-size: 12px; font-weight: 700;
            cursor: pointer; font-family: 'Montserrat', sans-serif; transition: 0.2s;
            display: flex; align-items: center; gap: 6px;
        }
        .refresh-btn:hover { background: #023e50; color: #fff; }
        .refresh-btn i { transition: 0.4s; }
        .refresh-btn.spinning i { animation: spin 0.8s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <header class="global-header">
        <div class="header-left"><div class="brand"><i class="fa-solid fa-graduation-cap"></i><span>RootRy</span></div></div>
        <div class="header-center">
            <div class="user-info">
                <img src="" alt="Аватар" id="headerAvatar" class="avatar">
                <span id="headerUsername" class="username">Загрузка...</span>
            </div>
        </div>
        <div class="header-right">
            <div class="balance-box"><i class="fa-solid fa-coins"></i><span id="userBalance">0</span> <small>монет</small></div>
        </div>
    </header>

    <main class="main-content">
        <section class="app-window">
            <h1>Панель администратора</h1>

            <!-- Шапка с профилем -->
            <div class="admin-header-card" id="adminHeaderCard">
                <div class="admin-av">👑</div>
                <div>
                    <h2 id="adminNickname">Администратор</h2>
                    <p>@<span id="adminUsername">—</span> · Полный доступ к статистике платформы</p>
                </div>
                <button class="back-btn" onclick="window.location.href='profile.html'"><i class="fa-solid fa-arrow-left"></i> Назад в профиль</button>
            </div>

            <!-- СТАТИСТИКА -->
            <div style="display:flex;align-items:center;gap:12px;margin-bottom:16px;max-width:900px">
                <div class="users-section-title" style="margin-bottom:0"><i class="fa-solid fa-chart-line" style="color:#0099cc"></i> Статистика платформы</div>
                <button class="refresh-btn" id="refreshBtn" onclick="loadStats()"><i class="fa-solid fa-arrows-rotate"></i> Обновить</button>
            </div>
            <div class="stats-grid" id="statsGrid">
                <div style="color:#8e9fae;font-size:14px;padding:20px"><i class="fa-solid fa-circle-notch fa-spin"></i> Загрузка...</div>
            </div>

            <!-- СПИСОК ПОЛЬЗОВАТЕЛЕЙ -->
            <div class="users-section-title"><i class="fa-solid fa-users" style="color:#0099cc"></i> Пользователи</div>
            <div class="users-table-wrap">
                <div class="users-search">
                    <input type="text" id="userSearch" placeholder="Поиск по нику или username..." oninput="filterUsers()">
                    <div class="total-badge" id="userCountBadge">0 игроков</div>
                </div>
                <div id="usersTableWrap">
                    <div style="padding:40px;text-align:center;color:#8e9fae;font-size:14px"><i class="fa-solid fa-circle-notch fa-spin"></i> Загрузка...</div>
                </div>
            </div>
        </section>
    </main>

    <nav class="bottom-tabbar">
        <a href="games.html" class="tab-item"><i class="fa-solid fa-gamepad"></i><span>Игры</span></a>
        <a href="shop.html" class="tab-item"><i class="fa-solid fa-store"></i><span>Магазин</span></a>
        <a href="leaderboard.html" class="tab-item"><i class="fa-solid fa-trophy"></i><span>Топы</span></a>
        <a href="profile.html" class="tab-item"><i class="fa-solid fa-user"></i><span>Профиль</span></a>
        <a href="tests.html" class="tab-item"><i class="fa-solid fa-file-invoice"></i><span>Тесты</span></a>
        <a href="tree.html" class="tab-item"><i class="fa-solid fa-diagram-project"></i><span>Дерево</span></a>
        <a href="authors.html" class="tab-item"><i class="fa-solid fa-users"></i><span>Авторы</span></a>
    </nav>

    <script src="api.js"></script>
    <script>
    initHeader();
    let allUsers = [];

    async function init() {
        const u = API.user();
        if (!u || !u.is_admin) {
            showToast('Доступ запрещён', 'error');
            setTimeout(() => window.location.href = 'profile.html', 1500);
            return;
        }
        document.getElementById('adminNickname').textContent = u.nickname || u.username;
        document.getElementById('adminUsername').textContent = u.username;

        // Обновляем аватарку в шапке карточки
        const avSrc = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(u.username)}`;
        document.querySelector('.admin-av').innerHTML = `<img src="${avSrc}" style="width:100%;height:100%;border-radius:50%;object-fit:cover">`;

        await Promise.all([loadStats(), loadUsers()]);
    }

    async function loadStats() {
        const btn = document.getElementById('refreshBtn');
        btn.classList.add('spinning');
        const r = await API.get('/api/admin/stats');
        btn.classList.remove('spinning');
        if (!r.ok) return;
        const s = r.data;
        document.getElementById('statsGrid').innerHTML = `
            <div class="stat-card online-card">
                <div class="sc-icon">🟢</div>
                <div class="sc-val">${s.active_today ?? 0}</div>
                <div class="sc-label">Активны сегодня</div>
                <div class="sc-sub">Заходили или играли сегодня</div>
            </div>
            <div class="stat-card total-card">
                <div class="sc-icon">👥</div>
                <div class="sc-val">${s.total_users ?? 0}</div>
                <div class="sc-label">Всего игроков</div>
                <div class="sc-sub">Зарегистрировано на платформе</div>
            </div>
            <div class="stat-card">
                <div class="sc-icon">🎮</div>
                <div class="sc-val">${s.total_games ?? 0}</div>
                <div class="sc-label">Игр сыграно</div>
                <div class="sc-sub">Всего за всё время</div>
            </div>
            <div class="stat-card">
                <div class="sc-icon">📦</div>
                <div class="sc-val">${s.total_cases ?? 0}</div>
                <div class="sc-label">Кейсов открыто</div>
                <div class="sc-sub">Суммарно всеми игроками</div>
            </div>
            <div class="stat-card">
                <div class="sc-icon">⚡</div>
                <div class="sc-val">${(s.total_xp ?? 0).toLocaleString('ru')}</div>
                <div class="sc-label">Суммарный XP</div>
                <div class="sc-sub">Накоплен всеми игроками</div>
            </div>
            <div class="stat-card">
                <div class="sc-icon">🪙</div>
                <div class="sc-val">${(s.total_balance ?? 0).toLocaleString('ru')}</div>
                <div class="sc-label">Монет в обороте</div>
                <div class="sc-sub">Суммарный баланс игроков</div>
            </div>
            <div class="stat-card">
                <div class="sc-icon">🏅</div>
                <div class="sc-val">${s.total_badges ?? 0}</div>
                <div class="sc-label">Значков выдано</div>
                <div class="sc-sub">Суммарно у всех игроков</div>
            </div>
            <div class="stat-card">
                <div class="sc-icon">🎨</div>
                <div class="sc-val">${s.total_avatars ?? 0}</div>
                <div class="sc-label">Аватарок открыто</div>
                <div class="sc-sub">Суммарно у всех игроков</div>
            </div>
        `;
    }

    async function loadUsers() {
        const r = await API.get('/api/admin/users');
        if (!r.ok) return;
        allUsers = (r.data || []).filter(u => !u.is_admin);
        renderUsers(allUsers);
        document.getElementById('userCountBadge').textContent = allUsers.length + ' игроков';
    }

    function filterUsers() {
        const q = document.getElementById('userSearch').value.trim().toLowerCase();
        if (!q) { renderUsers(allUsers); return; }
        const filtered = allUsers.filter(u =>
            (u.username || '').toLowerCase().includes(q) ||
            (u.nickname || '').toLowerCase().includes(q)
        );
        renderUsers(filtered);
    }

    function renderUsers(users) {
        const today = new Date().toISOString().slice(0, 10);
        const wrap = document.getElementById('usersTableWrap');
        if (!users.length) {
            wrap.innerHTML = '<div class="no-users">Пользователи не найдены</div>';
            return;
        }
        // Сортируем по XP убыванию
        const sorted = [...users].sort((a, b) => (b.xp || 0) - (a.xp || 0));
        wrap.innerHTML = `<table>
            <thead>
                <tr>
                    <th>#</th>
                    <th>Игрок</th>
                    <th>Уровень</th>
                    <th>XP</th>
                    <th>Монеты</th>
                    <th>🔥 Серия</th>
                    <th>Значки</th>
                    <th>Статус</th>
                </tr>
            </thead>
            <tbody>
                ${sorted.map((u, i) => {
                    const level = Math.floor((u.xp || 0) / 200) + 1;
                    const avSrc = `https://api.dicebear.com/7.x/bottts/svg?seed=${encodeURIComponent(u.username)}`;
                    const isActiveToday = u.last_login === today || u.daily_tasks_date === today;
                    return `<tr>
                        <td style="color:#8e9fae;font-weight:800">${i + 1}</td>
                        <td>
                            <div class="user-av-cell">
                                <img src="${avSrc}" alt="">
                                <div>
                                    <div class="uname-col">${u.nickname || u.username}</div>
                                    <div class="nick-col">@${u.username}</div>
                                </div>
                            </div>
                        </td>
                        <td><span style="background:#e0f2fe;color:#0284c7;border-radius:8px;padding:3px 10px;font-size:12px;font-weight:800">Ур. ${level}</span></td>
                        <td>${(u.xp || 0).toLocaleString('ru')}</td>
                        <td>🪙 ${(u.balance || 0).toLocaleString('ru')}</td>
                        <td>${u.streak || 0} дн.</td>
                        <td>${(u.badges || []).slice(0, 4).join(' ')}</td>
                        <td>
                            <span class="active-dot ${isActiveToday ? 'today' : ''}"></span>
                            ${isActiveToday ? '<span style="color:#059669;font-size:12px;font-weight:700">Сегодня</span>' : '<span style="color:#8e9fae;font-size:12px">Неактивен</span>'}
                        </td>
                    </tr>`;
                }).join('')}
            </tbody>
        </table>`;
    }

    init();
    // Автообновление каждые 60 секунд
    setInterval(() => loadStats(), 60000);
    </script>
</body>
</html>
