const tc = document.getElementById('tc');
const tooltip = document.getElementById('tooltip');
let activeNode = null;

function nodeClass(level) {
  if(level===0) return 'node node-root';
  if(level===1) return 'node node-l1';
  if(level===2) return 'node node-l2';
  if(level===3) return 'node node-l3';
  return 'node node-l4';
}

function build(data, parentEl, isRoot=false) {
  const branch = document.createElement('div');
  branch.className = 'branch';
  if(!isRoot) branch.classList.add('collapsed');

  const nodeEl = document.createElement('div');
  nodeEl.className = nodeClass(data.level);
  nodeEl.textContent = data.label;
  nodeEl.dataset.label = data.label;

  if(data.children && data.children.length) {
    const ind = document.createElement('div');
    ind.className = 'toggle-indicator';
    ind.textContent = '+';
    nodeEl.appendChild(ind);
    nodeEl.style.paddingRight = '22px';

    nodeEl.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasOpen = !branch.classList.contains('collapsed');
      branch.classList.toggle('collapsed');
      ind.textContent = wasOpen ? '+' : '−';
    });
  }

  nodeEl.addEventListener('mouseenter', (e) => {
    const def = DEFS[data.label];
    if(!def) return;
    tooltip.innerHTML = `<strong>${data.label}</strong>${def}`;
    tooltip.classList.add('show');
    posTooltip(e);
  });
  nodeEl.addEventListener('mousemove', posTooltip);
  nodeEl.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

  branch.appendChild(nodeEl);

  if(data.children && data.children.length) {
    const connWrap = document.createElement('div');
    connWrap.className = 'connector-wrap';

    const vSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    vSvg.setAttribute('class','vline');
    vSvg.setAttribute('width','2');
    vSvg.setAttribute('height','18');
    vSvg.setAttribute('viewBox','0 0 2 18');
    vSvg.innerHTML = '<line x1="1" y1="0" x2="1" y2="18" stroke="#bae6fd" stroke-width="1.5"/>';
    connWrap.appendChild(vSvg);

    const childRow = document.createElement('div');
    childRow.className = 'children-row';

    data.children.forEach(child => {
      const childBranch = build(child, childRow);
      childRow.appendChild(childBranch);
    });

    const hSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    hSvg.setAttribute('class','hlines');
    hSvg.style.width = '100%';
    hSvg.style.height = '14px';
    hSvg.style.overflow = 'visible';
    hSvg.setAttribute('viewBox','0 0 100 14');
    hSvg.setAttribute('preserveAspectRatio','none');
    hSvg.innerHTML = '<line x1="0" y1="0" x2="100" y2="0" stroke="#bae6fd" stroke-width="1" vector-effect="non-scaling-stroke"/>';
    connWrap.appendChild(hSvg);
    connWrap.appendChild(childRow);

    branch.appendChild(connWrap);
  }

  if(isRoot) {
    branch.classList.remove('collapsed');
  }

  return branch;
}

function posTooltip(e) {
  const x = e.clientX + 16;
  const y = e.clientY - 10;
  const tw = 288;
  const th = 120;
  tooltip.style.left = Math.min(x, window.innerWidth - tw - 12) + 'px';
  tooltip.style.top = Math.max(8, Math.min(y, window.innerHeight - th - 12)) + 'px';
}

const rootBranch = build(TREE, tc, true);
tc.appendChild(rootBranch);

document.getElementById('exp-all').addEventListener('click', () => {
  tc.querySelectorAll('.branch').forEach(b => {
    b.classList.remove('collapsed');
    const ind = b.querySelector('.toggle-indicator');
    if(ind) ind.textContent = '−';
  });
});
document.getElementById('col-all').addEventListener('click', () => {
  tc.querySelectorAll('.branch:not(:first-child)').forEach(b => {
    b.classList.add('collapsed');
    const ind = b.querySelector('.toggle-indicator');
    if(ind) ind.textContent = '+';
  });
});

const qEl = document.getElementById('q');
const scEl = document.getElementById('search-count');
qEl.addEventListener('input', () => {
  const q = qEl.value.trim().toLowerCase();
  const allNodes = tc.querySelectorAll('.node');
  allNodes.forEach(n => { n.classList.remove('search-match','search-dim'); });
  if(!q) { scEl.textContent=''; return; }
  let count = 0;
  allNodes.forEach(n => {
    const lbl = (n.dataset.label||'').toLowerCase();
    if(lbl.includes(q)) {
      n.classList.add('search-match');
      count++;
      let b = n.closest('.branch');
      while(b) {
        b.classList.remove('collapsed');
        const ind = b.querySelector(':scope > .node > .toggle-indicator');
        if(ind) ind.textContent = '−';
        b = b.parentElement?.closest('.branch');
      }
    } else {
      n.classList.add('search-dim');
    }
  });
  scEl.textContent = count ? `Найдено: ${count}` : 'Не найдено';
});
