* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:'Segoe UI',sans-serif; background:#e9eff5; }

/* ===== HEADER ===== */
.global-header {
    position:fixed; top:0; left:0; right:0; z-index:1000;
    height:64px;
    background:linear-gradient(90deg,#023e50,#0099cc);
    display:flex; align-items:center; justify-content:space-between;
    padding:0 20px;
    box-shadow:0 4px 20px rgba(0,0,0,0.15);
}
.header-left .brand { display:flex; align-items:center; gap:8px; font-weight:700; color:#fff; font-size:18px; font-family:'Segoe UI',sans-serif; }
.header-left .brand i { color:#7dd3fc; font-size:20px; }
.header-center .user-info { display:flex; align-items:center; gap:10px; cursor:pointer; }
.header-center .avatar { width:36px; height:36px; border-radius:50%; border:2px solid rgba(255,255,255,0.5); object-fit:cover; }
.header-center .username { color:#fff; font-weight:600; font-size:14px; font-family:'Segoe UI',sans-serif; }
.header-right .balance-box { display:flex; align-items:center; gap:6px; background:rgba(255,255,255,0.15); border-radius:20px; padding:8px 14px; color:#fff; font-weight:700; font-size:14px; font-family:'Segoe UI',sans-serif; border:1px solid rgba(255,255,255,0.2); }
.header-right .balance-box i { color:#fde68a; }
.header-right .balance-box small { font-size:11px; opacity:0.8; font-weight:500; }

/* ===== BOTTOM TAB BAR ===== */
.bottom-tabbar {
    position:fixed; bottom:0; left:0; right:0; z-index:1000;
    height:64px;
    background:#fff;
    display:flex; align-items:center; justify-content:space-around;
    box-shadow:0 -2px 20px rgba(0,0,0,0.08);
    border-top:1px solid #e9eff5;
}
.tab-item {
    display:flex; flex-direction:column; align-items:center; gap:3px;
    color:#8e9fae; text-decoration:none; font-size:10px; font-weight:600;
    font-family:'Segoe UI',sans-serif; transition:0.2s; padding:6px 8px; border-radius:12px;
    min-width:44px;
}
.tab-item i { font-size:18px; }
.tab-item:hover { color:#0099cc; }
.tab-item.active { color:#0099cc; }
.tab-item.active i { color:#0099cc; }

/* ===== TREE AREA ===== */
#tree-root {
    width:100%;
    padding:20px 16px 90px;
    overflow-x:auto;
    margin-top:64px;
    min-height:calc(100vh - 128px);
}
.tree-container { display:flex; flex-direction:column; align-items:center; min-width:max-content; }

.level { display:flex; gap:14px; justify-content:center; align-items:flex-start; position:relative; }
.level + .level { margin-top:0; }

.branch { display:flex; flex-direction:column; align-items:center; position:relative; }

.node {
  padding:10px 20px;
  border-radius:24px;
  font-size:15px;
  font-weight:500;
  cursor:pointer;
  white-space:nowrap;
  border:2px solid;
  transition:all .18s;
  position:relative;
  z-index:2;
  user-select:none;
  line-height:1.4;
}
.node:hover { transform:translateY(-2px); filter:brightness(1.05); }

.node-root {
  background:#023e50; border-color:#023e50; color:#fff;
  font-size:20px; font-weight:700; padding:14px 36px; border-radius:28px; letter-spacing:.4px;
  box-shadow:0 4px 18px rgba(2,62,80,0.25);
}
.node-l1 { background:#e0f2fe; border-color:#7dd3fc; color:#0c4a6e; font-weight:700; font-size:15px; padding:10px 22px; box-shadow:0 2px 10px rgba(14,165,233,0.12); }
.node-l2 { background:#f0f9ff; border-color:#bae6fd; color:#075985; font-size:14px; padding:9px 18px; }
.node-l3 { background:#f8fafc; border-color:#e2e8f0; color:#334155; font-size:13px; padding:8px 16px; }
.node-l4 { background:#fff; border-color:#f1f5f9; color:#64748b; font-size:12px; padding:7px 14px; }
.node.active { box-shadow:0 0 0 3px rgba(14,165,233,.35); }

.connector-wrap { display:flex; flex-direction:column; align-items:center; width:100%; }
svg.vline { display:block; flex-shrink:0; }
svg.hlines { display:block; flex-shrink:0; }
.children-row { display:flex; gap:14px; justify-content:center; align-items:flex-start; }
.collapsed > .connector-wrap { display:none; }

.toggle-indicator {
  position:absolute; right:-5px; top:-5px;
  width:18px; height:18px; border-radius:50%;
  background:#0ea5e9; color:#fff; font-size:11px;
  display:flex; align-items:center; justify-content:center;
  font-weight:700; pointer-events:none; line-height:1;
  box-shadow:0 1px 4px rgba(14,165,233,0.4);
}

/* ===== TOOLTIP — закреплён снизу экрана ===== */
.tooltip {
  position:fixed;
  bottom:72px;
  left:50%;
  transform:translateX(-50%) translateY(20px);
  background:#023e50; color:#fff;
  padding:12px 18px; border-radius:14px; font-size:13px;
  max-width:90vw; width:340px; line-height:1.55; z-index:9999;
  pointer-events:none; box-shadow:0 -4px 24px rgba(0,0,0,0.22);
  opacity:0; transition:opacity .2s, transform .2s;
}
.tooltip.show { opacity:1; transform:translateX(-50%) translateY(0); }
.tooltip strong { display:block; font-size:14px; font-weight:600; margin-bottom:5px; color:#7dd3fc; }

#search-bar {
  display:flex; align-items:center; gap:8px;
  padding:8px 14px; background:#f8fafc; border:1.5px solid #e2e8f0;
  border-radius:24px; margin:0 8px 14px; position:sticky; top:0;
  z-index:100; backdrop-filter:blur(8px);
}
#search-bar input { border:none; outline:none; background:transparent; font-size:13px; color:#334155; flex:1; min-width:0; }
#search-bar input::placeholder { color:#94a3b8; }
#search-bar .ico { color:#94a3b8; font-size:14px; }
#search-count { font-size:12px; color:#0ea5e9; font-weight:500; white-space:nowrap; }

.node.search-dim { opacity:.25; }
.node.search-match {
  background:#fef3c7 !important; border-color:#f59e0b !important;
  color:#78350f !important; box-shadow:0 0 0 2px rgba(245,158,11,.3);
}

const DEFS = {
  "РУССКИЙ ЯЗЫК":"Государственный язык Российской Федерации, один из восточнославянских языков, официальный язык ООН. Включает фонетику, лексику, грамматику и синтаксис.",
  "1. ФОНЕТИКА":"Раздел языкознания, изучающий звуки речи, их образование, акустические свойства и функции в языке.",
  "Звуки речи":"Минимальные незначимые единицы языка, производимые речевым аппаратом. Делятся на гласные и согласные.",
  "Гласные":"Звуки, при произношении которых воздух свободно проходит через ротовую полость. В русском языке: А, Е, Ё, И, О, У, Ы, Э, Ю, Я.",
  "Согласные":"Звуки, при произношении которых воздушная струя встречает преграды. Бывают звонкими/глухими, твёрдыми/мягкими.",
  "Ударение":"Выделение одного слога в слове усилением голоса или повышением тона. В русском языке ударение свободное и подвижное.",
  "Интонация":"Совокупность звуковых средств: мелодика, темп, тембр, ударение. Выражает смысл и эмоции высказывания.",
  "Слог":"Минимальная произносительная единица. Образуется вокруг гласного звука.",
  "Фонетический разбор":"Анализ слова по звуковому составу: транскрипция, характеристика каждого звука, подсчёт букв и звуков.",
  "Характеристики согласных":"Согласные классифицируются по звонкости/глухости, твёрдости/мягкости, месту и способу образования.",
  "Звонкие / глухие":"Звонкие согласные произносятся с голосом (Б, В, Г, Д, З...), глухие — без голоса (П, Ф, К, Т, С...). Большинство образуют пары.",
  "Твёрдые / мягкие":"Твёрдые произносятся без смягчения, мягкие — с подъёмом средней части языка к нёбу. Обозначаются знаком '.",
  "Парные / непарные":"Большинство согласных образуют пары по звонкости (Б—П, В—Ф...). Непарные звонкие: Л, М, Н, Р, Й. Непарные глухие: Х, Ц, Ч, Щ.",
  "Место образования":"Классификация по месту преграды: губные (Б, П, М), зубные (Д, Т, С), нёбные (Ш, Ж, Ч, Щ), заднеязычные (К, Г, Х).",
  "Способ образования":"Классификация по типу преграды: смычные (Б, П), щелевые (С, З), аффрикаты (Ц, Ч), дрожащие (Р), боковые (Л).",
  "2. ГРАФИКА И АЛФАВИТ":"Раздел, изучающий систему знаков для письменной передачи языка. Алфавит, буквы и их соответствие звукам.",
  "Кириллица":"Письменность, созданная в IX веке Кириллом и Мефодием. Современный русский алфавит содержит 33 буквы.",
  "Буквы и звуки":"Буквы — знаки письма; звуки — единицы речи. Одна буква может обозначать разные звуки (Е→[йэ] или [э]).",
  "Прописные / строчные буквы":"Прописные (заглавные) пишутся в начале предложения, в именах собственных. Строчные — в остальных случаях.",
  "Алфавитный порядок":"33 буквы в строгой последовательности: А Б В Г Д Е Ё Ж З И Й К Л М Н О П Р С Т У Ф Х Ц Ч Ш Щ Ъ Ы Ь Э Ю Я.",
  "Йотированные буквы":"Буквы Е, Ё, Ю, Я обозначают два звука в начале слова, после гласной и после Ъ/Ь: яма [й-а-м-а].",
  "3. ОРФОГРАФИЯ":"Система правил написания слов. Включает правила о гласных, согласных, разделительных знаках, слитном/раздельном написании.",
  "Правописание гласных":"Правила написания гласных букв в корнях, приставках, суффиксах и окончаниях. Проверяется ударением или по правилу.",
  "Безударные гласные":"В безударной позиции гласные произносятся редуцированно. Написание проверяется ударной формой: вода → воды.",
  "Чередующиеся гласные":"Гласные, которые чередуются в зависимости от условий: КОС-/КАС- (есть А — КАС), РАСТи/РОСток и др.",
  "Проверяемые / непроверяемые":"Проверяемые: подбирается однокоренное слово с ударной гласной. Непроверяемые (словарные) нужно запоминать.",
  "Правописание согласных":"Правила написания согласных: парные, непроизносимые, удвоенные. Часто проверяются подбором форм слова.",
  "Парные согласные":"На конце слова и перед глухими согласными оглушаются. Проверка: изменить форму, чтобы после согласного шёл гласный.",
  "Непроизносимые согласные":"В сочетаниях СТН, ЗДН, СТЛ и др. одна буква не произносится: сердце, солнце, местный. Проверка однокоренным словом.",
  "Удвоенные согласные":"НН, СС, ЛЛ и др. на стыке морфем или в заимствованиях: ванная, металл, программа.",
  "Ь и Ъ":"Ъ (разделительный) — после приставок перед Е, Ё, Ю, Я: съезд. Ь (мягкий знак) — обозначает мягкость или разделяет морфемы.",
  "Правила после шипящих":"После Ж, Ш, Ч, Щ написание гласных регулируется особыми правилами: жи/ши, ча/ща, чу/щу.",
  "ЖИ/ШИ":"Всегда пишется И: жизнь, шина, лыжи. Несмотря на произношение [ы].",
  "ЧА/ЩА":"Всегда пишется А: чашка, площадь, щавель.",
  "ЧУ/ЩУ":"Всегда пишется У: чудо, щука, чулок.",
  "Приставки":"Морфемы, стоящие перед корнем и изменяющие значение слова. Написание зависит от правил: ПРЕ-/ПРИ-, З-/С- и др.",
  "ПРЕ-/ПРИ-":"ПРЕ- = «очень» или «пере-»: прекрасный, преграда. ПРИ- = присоединение, неполнота, приближение: приехать, приоткрыть.",
  "РАЗ-/РОЗ-":"Под ударением пишется О: рóзыск, рóспись. Без ударения — А: разыскивать, расписка.",
  "З/С на конце приставок":"Перед звонкими согласными — З (разбить, сделать), перед глухими — С (расставить, испугать).",
  "Суффиксы":"Морфемы между корнем и окончанием. Написание суффиксов -ЕК-/-ИК-, -ЧИК-/-ЩИК-, -ОВА-/-ЕВА- и др. подчиняется правилам.",
  "Окончания":"Изменяемая часть слова, выражающая грамматические значения. Написание зависит от склонения, спряжения, рода, числа.",
  "НЕ и НИ":"НЕ — отрицание или усиление утверждения в придаточных. НИ — усиление отрицания: никто, ни разу. Правила написания с разными частями речи.",
  "Н и НН":"В прилагательных и причастиях: -Н- в отыменных (каменный), -НН- при приставке или суффиксе -ОВА-. В кратких причастиях — одно Н.",
  "Слитное / раздельное написание":"Правила написания сложных слов, наречий, частиц. Зависит от части речи и значения: несмотря (предлог) / не смотря (деепричастие).",
  "Дефисное написание":"Через дефис пишутся: сложные слова (диван-кровать), некоторые наречия (по-русски), частица КОЕ- и суффиксы -ТО, -ЛИБО, -НИБУДЬ.",
  "Орфографический разбор":"Анализ написания слова: выделение орфограммы, указание правила, проверочное слово или форма.",
  "4. МОРФЕМИКА":"Раздел языкознания, изучающий морфемы — минимальные значимые части слова: корень, приставку, суффикс, окончание.",
  "Морфемы":"Минимальные значимые единицы языка. Бывают корневые и служебные (аффиксы). Образуют слова и их формы.",
  "Корень":"Главная значимая часть слова, несущая основное лексическое значение. Однокоренные слова объединяются общим корнем.",
  "Основа":"Часть слова без окончания. Выражает лексическое и словообразовательное значение.",
  "Морфемный разбор":"Разбор слова по составу: выделение окончания, основы, корня, приставок, суффиксов с графическим обозначением.",
  "Однокоренные слова":"Слова с одним корнем и связанным значением: лес, лесной, лесник, перелесок.",
  "Постфикс":"Суффикс, стоящий после окончания: -СЯ/-СЬ в глаголах (умываться), -ТО, -ЛИБО, -НИБУДЬ в местоимениях.",
  "Приставка":"Морфема перед корнем, изменяющая значение слова: пере-, под-, раз-, вы- и др. Может быть несколько приставок.",
  "Суффикс":"Морфема после корня, образующая новые слова или формы: -тель (учитель), -ость (красота), -ск- (городской).",
  "5. СЛОВООБРАЗОВАНИЕ":"Раздел языкознания о том, как образуются новые слова. Включает способы словообразования и словообразовательный анализ.",
  "Способы образования слов":"Основные способы: приставочный, суффиксальный, приставочно-суффиксальный, бессуффиксный, сложение, аббревиация.",
  "Приставочный":"Новое слово образуется добавлением приставки: ходить → переходить, класть → вложить.",
  "Суффиксальный":"Добавляется суффикс: учить → учитель, синий → синеть. Самый продуктивный способ словообразования.",
  "Приставочно-суффиксальный":"Одновременное добавление приставки и суффикса: дорога → бездорожье, стол → настольный.",

const tc = document.getElementById('tc');
const tooltip = document.getElementById('tooltip');

function nodeClass(level) {
  if(level===0) return 'node node-root';
  if(level===1) return 'node node-l1';
  if(level===2) return 'node node-l2';
  if(level===3) return 'node node-l3';
  return 'node node-l4';
}

function build(data, parentEl, isRoot=false) {
  const branch = document.createElement('div');
  branch.className = 'branch';
  if(!isRoot) branch.classList.add('collapsed');

  const nodeEl = document.createElement('div');
  nodeEl.className = nodeClass(data.level);
  nodeEl.textContent = data.label;
  nodeEl.dataset.label = data.label;

  if(data.children && data.children.length) {
    const ind = document.createElement('div');
    ind.className = 'toggle-indicator';
    ind.textContent = '+';
    nodeEl.appendChild(ind);
    nodeEl.style.paddingRight = '22px';

    nodeEl.addEventListener('click', (e) => {
      e.stopPropagation();
      const wasOpen = !branch.classList.contains('collapsed');
      branch.classList.toggle('collapsed');
      ind.textContent = wasOpen ? '+' : '−';
    });
  }

  nodeEl.addEventListener('mouseenter', (e) => {
    const def = DEFS[data.label];
    if(!def) return;
    tooltip.innerHTML = `<strong>${data.label}</strong>${def}`;
    tooltip.classList.add('show');
  });
  nodeEl.addEventListener('mouseleave', () => tooltip.classList.remove('show'));

  branch.appendChild(nodeEl);

  if(data.children && data.children.length) {
    const connWrap = document.createElement('div');
    connWrap.className = 'connector-wrap';

    const vSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    vSvg.setAttribute('class','vline');
    vSvg.setAttribute('width','2');
    vSvg.setAttribute('height','24');
    vSvg.setAttribute('viewBox','0 0 2 24');
    vSvg.innerHTML = '<line x1="1" y1="0" x2="1" y2="24" stroke="#bae6fd" stroke-width="2"/>';
    connWrap.appendChild(vSvg);

    const childRow = document.createElement('div');
    childRow.className = 'children-row';

    data.children.forEach(child => {
      const childBranch = build(child, childRow);
      childRow.appendChild(childBranch);
    });

    const hSvg = document.createElementNS('http://www.w3.org/2000/svg','svg');
    hSvg.setAttribute('class','hlines');
    hSvg.style.width = '100%';
    hSvg.style.height = '14px';
    hSvg.style.overflow = 'visible';
    hSvg.setAttribute('viewBox','0 0 100 14');
    hSvg.setAttribute('preserveAspectRatio','none');
    hSvg.innerHTML = '<line x1="0" y1="0" x2="100" y2="0" stroke="#bae6fd" stroke-width="1" vector-effect="non-scaling-stroke"/>';
    connWrap.appendChild(hSvg);
    connWrap.appendChild(childRow);

    branch.appendChild(connWrap);
  }

  if(isRoot) {
    // Root starts collapsed — shows only root node, clicking reveals level-1 children
    branch.classList.add('collapsed');
    const ind = branch.querySelector('.toggle-indicator');
    if(ind) ind.textContent = '+';
  }
  return branch;
}

const rootBranch = build(TREE, tc, true);
tc.appendChild(rootBranch);

document.getElementById('exp-all').addEventListener('click', () => {
  tc.querySelectorAll('.branch').forEach(b => {
    b.classList.remove('collapsed');
    const ind = b.querySelector(':scope > .node > .toggle-indicator');
    if(ind) ind.textContent = '−';
  });
});
document.getElementById('col-all').addEventListener('click', () => {
  tc.querySelectorAll('.branch').forEach(b => {
    b.classList.add('collapsed');
    const ind = b.querySelector(':scope > .node > .toggle-indicator');
    if(ind) ind.textContent = '+';
  });
});

const qEl = document.getElementById('q');
const scEl = document.getElementById('search-count');
qEl.addEventListener('input', () => {
  const q = qEl.value.trim().toLowerCase();
  const allNodes = tc.querySelectorAll('.node');
  allNodes.forEach(n => { n.classList.remove('search-match','search-dim'); });
  if(!q) { scEl.textContent=''; return; }
  let count = 0;
  allNodes.forEach(n => {
    const lbl = (n.dataset.label||'').toLowerCase();
    if(lbl.includes(q)) {
      n.classList.add('search-match');
      count++;
      let b = n.closest('.branch');
      while(b) {
        b.classList.remove('collapsed');
        const ind = b.querySelector(':scope > .node > .toggle-indicator');
        if(ind) ind.textContent = '−';
        b = b.parentElement?.closest('.branch');
      }
    } else {
      n.classList.add('search-dim');
    }
  });
  scEl.textContent = count ? `Найдено: ${count}` : 'Не найдено';
});
</script>
